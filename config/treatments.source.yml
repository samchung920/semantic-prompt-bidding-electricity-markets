# Prompt-only treatment registry for the NAPS paper workspace.
#
# Fill in the prompt file paths once the prompt texts are written.
# The copied simulator accepts --prompt-file and --schema-profile.
#
# Example schema_profile values:
#   - tarj
#   - decision_rationale
#   - summary
#   - flexible
#
# Example treatment labels:
#   - tarj_default
#   - tarj_profit_max
#   - tarj_compliance

treatments:
  tarj_default:
    prompt_file: prompts/tarj_default_v1.txt
    schema_profile: tarj
